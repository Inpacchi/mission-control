# Maintenance
# ─────────────────────────────────────────────

maintenance:
  add_when: >
    A new TypeScript pattern is identified during a coding engagement that has
    meaningful cross-project applicability and meaningfully reduces a class of
    runtime errors or improves static guarantees. Add with rationale and code example.
  boundary_rule: >
    Project-specific type definitions, project-specific conventions (domain adapters,
    file extension requirements, import rules for enums), and backend-specific
    integration patterns belong in the agent body, not in this file.
  typescript_version: "Patterns documented here require TypeScript 4.9+ (satisfies operator)"
