# Cross-Project Component Test Strategies
# How to test shared UI components regardless of which project uses them.
# Last updated: 2026-03-15

mui_datagrid:
  description: "MUI DataGrid v8 (@mui/x-data-grid) — core grid component"
  applies_to:
    - "Any project using MUI DataGrid"

  element_discovery:
    preferred_method: "accessibility tree (read_page or playwright-cli snapshot)"
    why: "MUI DataGrid uses virtualized, heavily-nested DOM with generated class names. Accessibility tree is far more reliable."
    patterns:
      column_headers: "role=columnheader — each header is a columnheader cell"
      data_rows: "role=row within role=rowgroup — rows inside grid body"
      grid_cells: "role=gridcell — individual data cells"
      pagination: "paragraph containing 'Rows per page:' and '1–N of M'"
      sort_icons: "img elements inside columnheader"

  column_visibility_toggle:
    trigger: "button with name 'Toggle column visibility'"
    persistence: "localStorage under configurable storageKey"
    risk: "React 19 StrictMode double-mount can clobber localStorage on initial render"
    test_pattern: "toggle off → refresh → verify hidden → toggle on → navigate away → back → verify"

  formula_columns:
    indicators:
      header: "column header text contains 'fx'"
      aria: "aria-label contains 'Computed column'"
      cell_style: "fontStyle: italic on computed cells, normal on data cells"
    verification: "ALWAYS pair DOM check (read_page) with computed style check (javascript_tool/eval)"

  search:
    type: "client-side (useMemo filter, no network request)"
    location: "TextField above grid with SearchIcon"
    behavior: "case-insensitive substring across configured fields"

  gotchas:
    - id: "datagrid-virtual-scroll"
      symptom: "Asserting on rows that aren't in the viewport fails"
      cause: "DataGrid virtualizes rows — only visible rows exist in DOM"
      prevention: "Scroll to target row before asserting, or use API data for total count"
    - id: "datagrid-dom-vs-visual"
      symptom: "read_page shows element exists but it's invisible to user"
      cause: "Element can have correct text but invisible styling (color==bgcolor, low opacity)"
      prevention: "Always pair DOM check with computed style verification"
      example: "FxBadge — 'fx' text existed but was invisible (same color as background, opacity 0.15)"

mui_form_dialog:
  description: "MUI Dialog wrapper with TextField, MenuItem, Select — common CRUD pattern"
  applies_to:
    - "Any project using MUI Dialog for create/edit operations"

  element_discovery:
    dialog: "role=dialog — appears on open, disappears on close"
    text_fields: "role=textbox with name matching label text"
    select_fields: "MUI Select — role=combobox or role=button with name matching label"
    save_button: "role=button, name='Save' — inside dialog"
    cancel_button: "role=button, name='Cancel' — inside dialog"
    error_alert: "role=alert — appears on mutation failure"

  test_patterns:
    create: "click add button → wait for dialog → fill fields → click save → verify dialog closes → verify list updated"
    edit: "navigate to detail → click edit → wait for dialog with pre-filled values → modify → save → verify"
    validation: "submit with missing required fields → verify error alert appears → verify dialog stays open"

  gotchas:
    - id: "mui-select-interaction"
      symptom: "fill command doesn't work on MUI Select"
      cause: "MUI Select renders as a custom component, not a native select"
      prevention: "Use click to open dropdown, then click on MenuItem option"

status_chip:
  description: "Status indicator component — color-coded chip for domain entity status"
  applies_to:
    - "Any project using color-coded status chips (MUI Chip or equivalent)"

  testability_note:
    issue: "Color conveyed only via CSS, not in accessibility tree"
    proposed_fix: "Add aria-label='Status: {value}' or data-testid='status-chip-{value}'"
    impact: "Cannot verify correct color via accessibility tree alone — requires computed style check"

page_header:
  description: "PageHeader — breadcrumbs + title + optional action button"
  element_discovery:
    title: "role=heading, level 4"
    breadcrumbs: "role=navigation containing role=list with listitem links"
    action_button: "role=button with action name (e.g., 'Add Item')"
  notes: "Consistent across all list pages — same structure, different content"


# ─── Mission Control TUI Components ───
# Ink-based terminal components. Test via @inkjs/testing-library.
# Assert against lastFrame() string output, not DOM.

ink_deliverable_card:
  description: "DeliverableCard — TCG-styled card showing deliverable ID, name, status, effort pips"
  applies_to:
    - "mission-control (src/tui/components/DeliverableCard.tsx)"
  element_discovery:
    preferred_method: "lastFrame() string matching"
    why: "Ink has no DOM — output is a character buffer"
    patterns:
      id_bracket: "string contains '[D7]' or '[D12a]'"
      effort_pips: "string contains ●○ characters"
      selection_pointer: "string contains '▸' when selected"
      status_label: "string contains 'active', 'spec', 'plan', etc."
  test_patterns:
    render_selected: "render with isSelected=true → lastFrame() contains '▸' and '┃'"
    render_unselected: "render with isSelected=false → lastFrame() contains ' ' and '│'"
    rarity_color: "render with complexity='complex' → verify output (visual inspection or snapshot)"
    truncation: "render with name longer than width → verify '…' appears"
  gotchas:
    - id: "ink-card-width-truncation"
      symptom: "Name doesn't truncate, wraps to next line"
      cause: "Width calculation doesn't subtract pointer + bar + id + pips"
      prevention: "Always test with width=40 (narrow) to exercise truncation path"

ink_zone_strip:
  description: "ZoneStrip — column of DeliverableCards with zone header and subzone grouping"
  applies_to:
    - "mission-control (src/tui/components/ZoneStrip.tsx)"
  test_patterns:
    empty_zone: "render with cards=[] → verify empty state message"
    card_selection: "render with selectedCard=1 → verify second card has ▸ indicator"
    subzones: "render Active Zone with mixed statuses → verify subzone grouping"

ink_board_app:
  description: "BoardApp — top-level TUI with view router, responsive layout, help overlay"
  applies_to:
    - "mission-control (src/tui/BoardApp.tsx)"
  test_patterns:
    responsive_full: "render at width=120 → verify 4 zones side-by-side"
    responsive_collapsed: "render at width=100 → verify badge layout (D[n], G[n])"
    responsive_narrow: "render at width=50 → verify error message"
    help_overlay: "render → send '?' input → verify help text appears"
    view_routing: "render → send 'c' → verify chronicle view renders"
  gotchas:
    - id: "ink-boardapp-mock-stdout"
      symptom: "Cannot control dimensions in test"
      cause: "BoardApp reads process.stdout.columns which is fixed in test env"
      prevention: "Mock useStdout or pass dimensions as props"

ink_use_keyboard:
  description: "useKeyboard — central keyboard routing hook for all TUI views"
  applies_to:
    - "mission-control (src/tui/hooks/useKeyboard.ts)"
  test_patterns:
    zone_navigation: "send left/right → verify selectedZone changes"
    card_navigation: "send up/down → verify selectedCard changes"
    view_transitions: "send 'c' → verify viewMode='chronicle'"
    detail_entry: "select card + Enter → verify viewMode='detail' + expandedCardId set"
    search_flow: "in detail, send '/' → type query → Enter → verify detailActiveSearch"
  gotchas:
    - id: "ink-hook-isolation"
      symptom: "useInput handlers from one test leak into next"
      cause: "Ink hooks share process.stdin"
      prevention: "Unmount component in afterEach"

