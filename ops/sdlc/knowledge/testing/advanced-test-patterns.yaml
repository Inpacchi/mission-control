# Advanced Test Patterns
# Cross-project general patterns for resilience testing, property-based testing,
# and feature-flag isolation. Project-specific implementations belong in agent bodies.
# Last updated: 2026-03-13

last_updated: 2026-03-14
id: advanced-test-patterns
name: "Advanced Test Patterns"
description: >
  General, cross-project patterns for three advanced testing concerns: structured
  chaos experimentation, property-based testing for contract verification, and
  explicit feature-flag path coverage. These patterns apply regardless of stack
  and are not tied to any specific project.

# ─────────────────────────────────────────────
# Chaos Hypothesis Methodology
# ─────────────────────────────────────────────

chaos_hypothesis:
  description: >
    A structured framework for fault injection tests. Forces every chaos experiment
    to define a recovery path and learning objective before running. Prevents chaos
    tests that damage state without a way back and ensures every experiment produces
    a learnable result.

  experiment_structure:
    steady_state:
      description: "Define the observable, measurable baseline behavior before any fault is injected"
      guidance: >
        The steady state must be assertable — a function or set of assertions that can
        be called before and after the experiment to confirm the app is in a known-good
        state. If you cannot define steady state, you cannot write a valid chaos test.
      example: "Search returns results within 300ms, no error UI shown, WS connection active"

    hypothesis:
      description: "State the specific degraded behavior you expect when the fault is injected"
      guidance: >
        Be precise about the expected degraded state, not just 'the app handles it.'
        Include what the user should see and what should NOT be visible.
      example: >
        When the search service returns 503, the UI shows an error state — not a blank
        screen — and recovers automatically when the service comes back.

    blast_radius:
      description: "Define which system components are affected and which must remain unaffected"
      guidance: >
        Explicitly name the components in scope (impacted) and out of scope (must remain
        functional). This prevents a test from passing silently when the blast radius
        was larger than intended.
      example: "Search UI only; core navigation, data persistence, and WS connection are unaffected"

    rollback:
      description: "Define the mechanism to restore normal behavior within the test"
      guidance: >
        Every fault injection must be reversible within the same test. Do not rely on
        test teardown for fault removal — the recovery must be testable as part of the
        experiment.
      example: "route.unroute() restores real service responses within the same test"

    learning_target:
      description: "State what the test proves or disproves about the system's resilience"
      guidance: >
        A chaos test with no learning target is just a fault injection. The learning
        target frames what architectural claim is being validated.
      example: "Does graceful degradation actually gate on the correct UI state change?"

  execution_protocol:
    steps:
      - step: 1
        action: "Assert steady state passes before injecting fault"
        note: "If steady state fails before the experiment, the test is invalid"
      - step: 2
        action: "Inject fault"
      - step: 3
        action: "Assert degraded state matches hypothesis"
      - step: 4
        action: "Remove fault (rollback)"
      - step: 5
        action: "Assert steady state passes again after recovery"
        note: "If any step fails, the test itself is a bug — not a finding"

  comment_block_template: |
    /**
     * CHAOS EXPERIMENT: [short name]
     * Steady state: [observable baseline]
     * Hypothesis: When [fault], the system [expected degraded behavior] —
     *             not [unacceptable behavior] — and recovers when [condition]
     * Blast radius: [impacted component]; [unaffected components] are unaffected
     * Rollback: [mechanism to restore normal behavior within this test]
     * Learning target: [what architectural claim does this validate?]
     */

# ─────────────────────────────────────────────
# Property-Based Testing for Contract Verification
# ─────────────────────────────────────────────

property_based_testing:
  description: >
    Property-based testing verifies that invariants hold across the full input space,
    not just the examples a developer thought to write. Especially valuable for
    adapter/codec contract claims where the interface promises correct behavior for
    any valid input.

  when_to_use:
    - "A module makes a strong contract claim (encode/decode round-trips cleanly for any valid input)"
    - "Validation rules have boundary conditions that parametric examples can't exhaust"
    - "Multiple implementations of the same interface must all satisfy the same invariants"

  invariant_types:
    round_trip: "encode(decode(x)) === x and decode(encode(x)) === x"
    boundary: "Exactly at the limit is valid; one beyond is invalid"
    commutativity: "Operation order does not change the result"
    idempotency: "Applying an operation twice produces the same result as applying it once"

  tooling:
    javascript_typescript: "fast-check (fc)"
    python: "hypothesis"
    general_notes:
      - "Property tests run in-process — they are fast and belong in CI without slowing the suite"
      - "Shrinking: when a test fails, the framework finds the minimal failing case automatically"
      - "Seed determinism: reproduce failures by logging and reusing the failing seed"

  recommended_targets:
    - "Codec round-trips (encode → decode preserves identity)"
    - "Validation boundaries (exactly at max, exactly at min, one over)"
    - "Cross-implementation invariants (multiple adapters implementing the same interface)"

  pattern_template: |
    import fc from 'fast-check';

    test('codec round-trips any valid input', () => {
      fc.assert(
        fc.property(
          fc.record({ id: fc.string(), quantity: fc.integer({ min: 1, max: 4 }) }),
          (input) => {
            const encoded = codec.encode(input);
            const decoded = codec.decode(encoded);
            // Invariant: round-trip preserves identity
            return JSON.stringify(decoded) === JSON.stringify(input);
          }
        )
      );
    });

  tagging: "Tag as @regression. Run on PRs touching codec or validation files."

# ─────────────────────────────────────────────
# Feature-Flag Isolation Strategies
# ─────────────────────────────────────────────

feature_flag_isolation:
  description: >
    When a feature is gated by an environment flag, both code paths — flag=on and
    flag=off — must be tested explicitly. The flag's default does not cover both paths.
    A flag=off path can have zombie UI state (a disabled component that still renders
    a broken shell) that is invisible to tests that only run with the default.

  core_principle: "Never assume the flag default covers both code paths."

  strategy:
    flag_off_test:
      description: "Verify the system behaves correctly when the flag is disabled"
      what_to_assert:
        - "Gated feature does not render or execute"
        - "No outbound calls to the gated service"
        - "Graceful fallback UI is shown (not a broken shell)"
        - "No console errors from the disabled code path"

    flag_on_test:
      description: "Verify the system behaves correctly when the flag is enabled"
      what_to_assert:
        - "Gated feature renders and functions correctly"
        - "Correct calls made to the gated service"
        - "No regression in flag=off behavior (if flags can be toggled at runtime)"

  isolation_techniques:
    environment_variable: "Set via test config (playwright.config.ts env, pytest env fixture, etc.) — preferred for build-time flags"
    runtime_toggle: "Inject feature flag client mock — preferred for runtime-evaluated flags"
    describe_block_scoping: >
      Use separate describe blocks per flag state so test names make the tested path explicit.
      Example: test.describe('Feature disabled (default)') and test.describe('Feature enabled').

  common_pitfalls:
    - "Only testing the flag=on path and assuming off is safe — zombie UI state lives in the off path"
    - "Relying on the CI environment's default flag state instead of explicitly setting it in the test"
    - "Sharing browser contexts or process state between flag=on and flag=off tests — use isolation"
    - "Not asserting absence of service calls in the flag=off path (the call may still fire silently)"

